# Render deployment config for the Hygiene Log API
# Docs: https://render.com/docs/yaml-spec
#
# This deploys the Express API (artifacts/api-server) as a Web Service.
# The Postgres database is hosted on Supabase (free tier). Set DATABASE_URL
# in the Render dashboard (or via the render CLI) to your Supabase URI.
# The schema migration is run once with:
#   DATABASE_URL=<supabase-uri> pnpm --filter @workspace/db run push

services:
  - type: web
    name: rewaya-hygiene-api
    runtime: node
    region: oregon # change to your team's region
    plan: free
    branch: main
    # Build the pnpm workspace, then build & start the api-server
    buildCommand: |
      corepack enable
      corepack prepare pnpm@9.15.0 --activate
      pnpm install --no-frozen-lockfile --config.strict-peer-dependencies=false
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
      - key: PORT
        value: 10000
      # Set this in the Render dashboard to your Supabase connection string.
      - key: DATABASE_URL
        sync: false
