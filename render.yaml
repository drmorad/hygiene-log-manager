# Render deployment config for the Hygiene Log API
# Docs: https://render.com/docs/yaml-spec
#
# This deploys the Express API (artifacts/api-server) as a Web Service.
# The Postgres database is provisioned separately (or use Supabase — see README).

services:
  - type: web
    name: rewaya-hygiene-api
    runtime: node
    region: oregon # change to your team's region
    plan: free
    branch: main
    # Build the pnpm workspace, then build & start the api-server
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rewaya-hygiene-db
          property: connectionString

databases:
  - name: rewaya-hygiene-db
    databaseName: hygiene
    user: hygiene
    plan: free
    region: oregon
