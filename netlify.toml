[build]
  base = "artifacts/web-app"
  command = "pnpm install && pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  # Point this at your deployed API URL (Render). Override in Netlify UI if needed.
  VITE_API_URL = "https://rewaya-hygiene-api.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
